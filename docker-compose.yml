version: '3.8'

services:
  asktwice-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: asktwice-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8001}:8001"
    env_file:
      - ./server/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
