<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="verifyResult">Ask Twice — 验证结果</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="panel-container">
    <!-- 头部 -->
    <div class="panel-header">
      <img src="../icons/icon-48.png" alt="" class="panel-logo">
      <h1 class="panel-title">Ask Twice</h1>
    </div>

    <!-- 空状态 -->
    <div class="panel-empty" id="emptyState">
      <div class="empty-icon">🔍</div>
      <p class="empty-text" data-i18n="clickVerifyBtn"></p>
      <p class="empty-sub" data-i18n="resultShowHere"></p>
    </div>

    <!-- 结果区域（默认隐藏） -->
    <div class="panel-result" id="resultArea" style="display: none;">
      <!-- 综合评分 -->
      <div class="result-score-section" id="scoreSection">
        <div class="result-score-num" id="scoreNum">--</div>
        <div class="result-score-label" id="scoreLabel">--</div>
        <div class="result-score-bar">
          <div class="score-bar-fill" id="scoreBar"></div>
        </div>
      </div>

      <!-- 声明列表 -->
      <div class="result-section">
        <h2 class="section-title" data-i18n="claimVerify"></h2>
        <div id="claimsList"></div>
      </div>

      <!-- 利益冲突 -->
      <div class="result-section" id="conflictSection" style="display: none;">
        <h2 class="section-title" data-i18n="conflictTitle"></h2>
        <div id="conflictDetails"></div>
      </div>

      <!-- 元信息 -->
      <div class="result-meta" id="metaInfo"></div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
